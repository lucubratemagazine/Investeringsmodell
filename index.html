<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <title>Investeringsmodell</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      padding: 16px;
      background: #0b1120;
      color: #e5e7eb;
    }
    .card {
      background: #111827;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    }
    h1, h2, h3 {
      margin-top: 0;
    }
    .label {
      display: block;
      font-size: 0.85rem;
      color: #9ca3af;
      margin-bottom: 4px;
      margin-top: 8px;
    }
    input[type="number"] {
      width: 100%;
      padding: 8px;
      border-radius: 8px;
      border: 1px solid #374151;
      background: #020617;
      color: #e5e7eb;
    }
    button {
      border-radius: 999px;
      border: none;
      padding: 8px 14px;
      cursor: pointer;
      font-size: 0.9rem;
    }
    .primary {
      background: #2563eb;
      color: white;
    }
    .small {
      font-size: 0.8rem;
      padding: 6px 10px;
    }
  </style>
</head>
<body>
  <h1>Investeringsmodell</h1>

  <!-- OPPDATER DATA -->
  <section id="screen-update">
    <div class="card">
      <h2>Oljepris</h2>

      <!-- Dynamisk oljepris fra API -->
      <div id="oljepris">Henter...</div>
      <div id="sistOppdatert" style="font-size:0.8rem; color:#9ca3af; margin-top:4px;"></div>

      <!-- Manuell overstyring -->
      <label class="label">Dagens oljepris (USD) – manuell</label>
      <input type="number" id="oilPriceInput" value="100" />
      <div style="margin-top:8px;">
        <button class="primary small" onclick="updateOilPrice()">Oppdater oljepris manuelt</button>
        <button class="small" onclick="hentOljepris()">Hent fra API på nytt</button>
      </div>
    </div>

    <div class="card">
      <h2>Portefølje (forenklet demo)</h2>
      <label class="label">Porteføljeverdi (NOK)</label>
      <input type="number" id="portfolioInput" value="1000000" oninput="updatePortfolio()" />

      <label class="label">Kontanter (NOK)</label>
      <input type="number" id="cashInput" value="100000" oninput="updateCash()" />

      <div style="margin-top:8px; font-size:0.9rem;">
        <div>Porteføljeverdi: <span id="portfolioValueText"></span></div>
        <div>Kontanter: <span id="cashText"></span></div>
      </div>
    </div>
  </section>

  <script>
    // -------------------------
    // Enkel state-modell
    // -------------------------
    const state = {
      oilPrice: 100,
      portfolioValue: 1000000,
      cash: 100000
    };

    // -------------------------
    // Render-funksjon
    // -------------------------
    function render() {
      // Oppdater tekst for portefølje og kontanter
      document.getElementById("portfolioValueText").innerText =
        state.portfolioValue.toLocaleString("no-NO") + " NOK";
      document.getElementById("cashText").innerText =
        state.cash.toLocaleString("no-NO") + " NOK";

      // Oppdater oljepris-felt (manuell verdi)
      const oilInput = document.getElementById("oilPriceInput");
      if (oilInput) {
        oilInput.value = state.oilPrice;
      }
    }

    // -------------------------
    // Manuell oppdatering av oljepris
    // -------------------------
    function updateOilPrice() {
      const val = parseFloat(document.getElementById("oilPriceInput").value);
      if (!isNaN(val) && val > 0) {
        state.oilPrice = val;
        document.getElementById("oljepris").innerText = val.toFixed(2) + " USD (manuell)";
        document.getElementById("sistOppdatert").innerText =
          "Manuelt satt: " + new Date().toLocaleTimeString();
      }
    }

    // -------------------------
    // Oppdater portefølje og kontanter
    // -------------------------
    function updatePortfolio() {
      const val = parseFloat(document.getElementById("portfolioInput").value);
      if (!isNaN(val) && val > 0) {
        state.portfolioValue = val;
        render();
      }
    }

    function updateCash() {
      const val = parseFloat(document.getElementById("cashInput").value);
      if (!isNaN(val) && val >= 0) {
        state.cash = val;
        render();
      }
    }

    // -------------------------
    // Hent Brent-oljepris fra API
    // -------------------------
    async function hentOljepris() {
      const url = "https://api.api-ninjas.com/v1/commodities?name=brent";

      try {
        const response = await fetch(url, {
          headers: { "X-Api-Key": "DIN_API_NOKKEL_HER" } // ← BYTT UT DENNE
        });

        if (!response.ok) {
          throw new Error("Feil ved henting av oljepris");
        }

        const data = await response.json();
        const oljepris = data[0].price;

        state.oilPrice = oljepris;

        document.getElementById("oljepris").innerText = oljepris.toFixed(2) + " USD (API)";
        document.getElementById("sistOppdatert").innerText =
          "Sist oppdatert: " + new Date().toLocaleTimeString();

        // Synkroniser input-feltet
        const oilInput = document.getElementById("oilPriceInput");
        if (oilInput) {
          oilInput.value = oljepris.toFixed(2);
        }

      } catch (error) {
        console.error(error);
        document.getElementById("oljepris").innerText = "Kunne ikke hente pris";
      }
    }

    // -------------------------
    // Init når siden lastes
    // -------------------------
    window.onload = function() {
      render();
      hentOljepris(); // prøv å hente fra API med en gang
    };
  </script>
</body>
</html>
